<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#f7f2eb">
<title>今天也練習著 · Dear.Rehearsal</title>

<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+TC:wght@300;400&display=swap');
:root{
  --ink:#1a1410;--paper:#f7f2eb;--warm:#c8a882;--accent:#8b5e3c;
  --soft:#e8ddd0;--muted:#9a8878;--green:#4a6741;--gold:#c8a050;--blue:#4a6880;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{font-size:16px;}
body{background:var(--paper);color:var(--ink);font-family:'Noto Sans TC',sans-serif;
  font-weight:300;min-height:100vh;padding-bottom:4rem;}

/* HEADER */
header{padding:clamp(1rem,4vw,1.6rem) clamp(1rem,5vw,1.5rem) 1rem;
  text-align:center;border-bottom:1px solid var(--soft);background:white;position:sticky;top:0;z-index:10;}
.brand-en{font-family:'DM Serif Display',serif;font-size:clamp(1.2rem,5vw,1.5rem);
  letter-spacing:.02em;color:var(--ink);}
.brand-en em{font-style:italic;color:var(--accent);}
.brand-zh{font-family:'Noto Serif TC',serif;font-weight:300;
  font-size:clamp(.62rem,2vw,.7rem);letter-spacing:.4em;color:var(--muted);margin-top:.3rem;}
.lang-row{display:flex;justify-content:center;gap:.5rem;margin-top:.7rem;}
.lang-btn{border:1px solid var(--soft);background:transparent;color:var(--muted);
  font-family:'Noto Sans TC',sans-serif;font-size:.75rem;padding:.3rem .9rem;
  border-radius:20px;cursor:pointer;transition:all .2s;-webkit-tap-highlight-color:transparent;}
.lang-btn.active{background:var(--accent);color:white;border-color:var(--accent);}

main{max-width:640px;margin:0 auto;padding:clamp(1rem,4vw,1.5rem) clamp(1rem,4vw,1.2rem);}

/* CARDS */
.card{background:white;border:1px solid var(--soft);border-radius:14px;
  padding:clamp(1.2rem,4vw,1.6rem);margin-bottom:1.2rem;
  animation:fadeUp .35s ease;box-shadow:0 2px 12px rgba(0,0,0,.04);}
.intro-hi{font-family:'Noto Serif TC',serif;font-size:1rem;font-weight:400;color:var(--accent);margin-bottom:.7rem;}
.intro-body{font-size:clamp(.82rem,2.5vw,.88rem);line-height:1.9;color:#4a3e36;white-space:pre-line;}

/* CONSENT */
.consent-box{background:#faf6f0;border:1px solid var(--soft);border-radius:10px;
  padding:1rem 1.2rem;margin-bottom:1.4rem;font-size:.77rem;color:var(--muted);
  line-height:1.7;display:flex;gap:.8rem;align-items:flex-start;}
.consent-box input[type=checkbox]{margin-top:.15rem;accent-color:var(--accent);
  flex-shrink:0;width:18px;height:18px;cursor:pointer;}
.start-wrap{text-align:center;}

/* STEPS */
.step-row{display:flex;gap:.4rem;margin-bottom:1.6rem;justify-content:center;}
.sdot{width:8px;height:8px;border-radius:50%;background:var(--soft);transition:all .3s;}
.sdot.active{background:var(--accent);transform:scale(1.4);}
.sdot.done{background:var(--warm);}

/* Q CARD */
.q-num{font-size:.62rem;letter-spacing:.2em;color:var(--warm);text-transform:uppercase;margin-bottom:.7rem;}
.q-text{font-family:'Noto Serif TC',serif;font-size:clamp(1rem,3.5vw,1.08rem);
  font-weight:400;line-height:1.75;margin-bottom:.4rem;}
.q-hint{font-size:clamp(.72rem,2.2vw,.75rem);color:var(--muted);line-height:1.6;margin-bottom:1.2rem;}
textarea{width:100%;border:1px solid var(--soft);border-radius:8px;
  padding:.85rem 1rem;font-family:'Noto Sans TC',sans-serif;
  font-size:clamp(.88rem,3vw,.92rem);font-weight:300;color:var(--ink);
  background:var(--paper);resize:none;outline:none;line-height:1.7;
  min-height:80px;transition:border-color .2s;}
textarea:focus{border-color:var(--warm);}
textarea::placeholder{color:#c0b4a8;}

/* BUTTONS */
.btn-row{display:flex;justify-content:flex-end;gap:.7rem;margin-top:1rem;flex-wrap:wrap;}
button{cursor:pointer;border:none;font-family:'Noto Sans TC',sans-serif;
  font-size:clamp(.8rem,2.5vw,.85rem);border-radius:8px;padding:.65rem 1.3rem;
  transition:all .2s;-webkit-tap-highlight-color:transparent;}
.btn-primary{background:var(--accent);color:white;font-weight:400;}
.btn-primary:hover,.btn-primary:active{background:#7a5234;}
.btn-primary:disabled{background:var(--soft);color:var(--muted);cursor:not-allowed;}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--soft);}
.btn-ghost:hover{border-color:var(--muted);}

/* SPINNER */
.spinning{text-align:center;padding:3.5rem 1rem;animation:fadeUp .3s ease;}
.spinner{width:32px;height:32px;border:2px solid var(--soft);border-top-color:var(--warm);
  border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;}
@keyframes spin{to{transform:rotate(360deg);}}
.spinning p{color:var(--muted);font-size:.82rem;}

/* RESULT */
.result-wrap{animation:fadeUp .4s ease;}

/* LANDSCAPE — RWD image */
.landscape-card{border-radius:14px;overflow:hidden;margin-bottom:1.2rem;
  box-shadow:0 4px 20px rgba(0,0,0,.12);}
.landscape-illus{
  width:100%;
  height:clamp(140px,40vw,200px);
  object-fit:cover;
  object-position:center top;
  display:block;
  background:var(--soft);
}
.landscape-meta{background:var(--blue);padding:clamp(.8rem,3vw,.9rem) clamp(1rem,3vw,1.2rem) 1rem;}
.landscape-tag-label{font-size:.6rem;letter-spacing:.2em;text-transform:uppercase;
  color:rgba(255,255,255,.6);margin-bottom:.2rem;}
.landscape-name{font-family:'Noto Serif TC',serif;
  font-size:clamp(1rem,3.5vw,1.1rem);font-weight:400;color:white;}
.landscape-loc{font-size:clamp(.65rem,2vw,.7rem);color:rgba(255,255,255,.7);margin-top:.15rem;}
.landscape-pills{margin-top:.6rem;display:flex;gap:.4rem;flex-wrap:wrap;align-items:center;}
.tag-pill{font-size:.68rem;background:rgba(255,255,255,.15);
  color:rgba(255,255,255,.9);padding:.25rem .8rem;border-radius:20px;}
.maps-link{font-size:.68rem;background:rgba(255,255,255,.2);color:white;
  padding:.25rem .8rem;border-radius:20px;text-decoration:none;
  border:1px solid rgba(255,255,255,.3);display:inline-block;}
.maps-link:hover{background:rgba(255,255,255,.3);}

/* PRACTICE TEXT */
.card-label{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;margin-bottom:.8rem;}
.label-green{color:var(--green);}.label-accent{color:var(--accent);}
.label-gold{color:var(--gold);}.label-blue{color:var(--blue);}
.practice-text{font-family:'Noto Serif TC',serif;
  font-size:clamp(.88rem,2.8vw,.95rem);line-height:1.95;color:var(--ink);}

/* POSTCARD */
.postcard-inner{background:white;border:1px solid #ddd4c8;border-radius:12px;
  padding:clamp(1.4rem,4vw,2rem) 1.5rem;text-align:center;position:relative;margin-top:.5rem;}
.postcard-inner::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--warm),var(--accent),var(--green));
  border-radius:12px 12px 0 0;}
.postcard-sentence{font-family:'Noto Serif TC',serif;
  font-size:clamp(1.1rem,4vw,1.3rem);font-weight:600;line-height:1.8;
  color:var(--ink);letter-spacing:.04em;}
.postcard-corner{position:absolute;bottom:.7rem;right:1rem;font-size:.6rem;
  color:#d0c4b8;letter-spacing:.1em;font-family:'DM Serif Display',serif;font-style:italic;}

/* CYNICAL */
.cynical-btn-wrap{text-align:center;margin:.5rem 0 .8rem;}
.btn-cynical{background:transparent;border:1px dashed var(--muted);color:var(--muted);
  font-size:.78rem;padding:.5rem 1.2rem;border-radius:20px;}
.btn-cynical:hover{border-color:var(--ink);color:var(--ink);}
.cynical-card{background:#1a1410;border-radius:12px;padding:1.4rem;
  margin-bottom:1rem;display:none;animation:fadeUp .3s ease;}
.cynical-card.show{display:block;}
.cynical-text{font-family:'Noto Serif TC',serif;font-size:clamp(.95rem,3vw,1.05rem);
  line-height:1.8;color:#f0e8d8;text-align:center;}

/* ACTION ROW */
.action-row{display:flex;gap:.7rem;justify-content:flex-end;margin-bottom:1.2rem;flex-wrap:wrap;}
.btn-regen{background:var(--paper);color:var(--accent);border:1px solid var(--warm);font-size:.82rem;}

/* HISTORY */
.history-card{background:white;border:1px solid var(--soft);border-radius:14px;
  padding:1.4rem;margin-bottom:1rem;}
.history-entry{border:1px solid var(--soft);border-radius:10px;padding:1rem;
  margin-bottom:.8rem;cursor:pointer;transition:border-color .2s;}
.history-entry:hover{border-color:var(--warm);}
.history-entry:last-child{margin-bottom:0;}
.history-date{font-size:.65rem;color:var(--muted);letter-spacing:.1em;margin-bottom:.4rem;}
.history-sentence{font-family:'Noto Serif TC',serif;font-size:.9rem;
  color:var(--accent);font-weight:600;margin-bottom:.3rem;}
.history-landscape{font-size:.72rem;color:var(--muted);}
.history-empty{font-size:.82rem;color:var(--muted);text-align:center;padding:.5rem 0;}
.history-img{width:100%;height:60px;object-fit:cover;object-position:center top;
  border-radius:6px;margin-bottom:.5rem;}

/* CONTACT */
.contact-links{display:flex;gap:.6rem;flex-wrap:wrap;margin-top:.8rem;}
.contact-btn{display:inline-flex;align-items:center;gap:.4rem;
  font-size:clamp(.72rem,2.5vw,.78rem);padding:.5rem 1rem;border-radius:20px;
  text-decoration:none;border:1px solid var(--soft);background:var(--paper);
  color:var(--ink);cursor:pointer;font-family:'Noto Sans TC',sans-serif;
  -webkit-tap-highlight-color:transparent;}
.contact-btn:hover{border-color:var(--warm);}
.contact-btn svg{width:15px;height:15px;flex-shrink:0;}

/* BUILDER */
.builder-toggle{display:flex;align-items:center;gap:.6rem;font-size:.8rem;
  color:var(--muted);margin-bottom:.9rem;cursor:pointer;}
.builder-toggle input{accent-color:var(--accent);width:16px;height:16px;}
.builder-preview{border:1px solid var(--soft);border-radius:10px;overflow:hidden;margin-bottom:.9rem;}
.preview-img{width:100%;height:clamp(80px,22vw,110px);object-fit:cover;
  object-position:center top;display:block;background:var(--soft);}
.preview-body{padding:.8rem 1rem .9rem;background:white;}
.preview-top-bar{height:3px;background:linear-gradient(90deg,var(--warm),var(--accent),var(--green));
  margin:-.8rem -1rem .7rem;}
.preview-practice{font-family:'Noto Serif TC',serif;font-size:clamp(.68rem,2vw,.73rem);
  line-height:1.7;color:var(--ink);margin-bottom:.5rem;}
.preview-sentence{font-family:'Noto Serif TC',serif;
  font-size:clamp(.82rem,2.8vw,.95rem);font-weight:600;color:var(--accent);
  text-align:center;margin-bottom:.3rem;}
.preview-cynical{font-family:'Noto Serif TC',serif;font-size:.72rem;color:var(--muted);
  text-align:center;font-style:italic;padding-top:.3rem;display:none;}
.preview-cynical.show{display:block;}
.preview-brand{font-size:.58rem;color:#c0b4a8;text-align:right;letter-spacing:.1em;margin-top:.5rem;}
.builder-btns{display:flex;gap:.6rem;justify-content:flex-end;flex-wrap:wrap;}
.btn-save{background:var(--accent);color:white;font-size:.8rem;padding:.55rem 1.1rem;border-radius:8px;}
.btn-ig{background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366);
  color:white;font-size:.8rem;padding:.55rem 1.1rem;border-radius:8px;}

/* FEEDBACK / NOTIFY */
.inline-input{width:100%;border:1px solid var(--soft);border-radius:8px;
  padding:.65rem .9rem;font-family:'Noto Sans TC',sans-serif;
  font-size:clamp(.82rem,2.5vw,.85rem);background:var(--paper);color:var(--ink);
  outline:none;margin-bottom:.6rem;}
.inline-input:focus{border-color:var(--warm);}
.success-msg{font-size:.78rem;color:var(--green);padding:.3rem 0;display:none;}
.notify-row{display:flex;gap:.6rem;}
.notify-row input{flex:1;border:1px solid var(--soft);border-radius:8px;
  padding:.6rem .9rem;font-family:'Noto Sans TC',sans-serif;
  font-size:clamp(.8rem,2.5vw,.85rem);background:var(--paper);color:var(--ink);outline:none;}
.notify-row input:focus{border-color:var(--warm);}
.btn-notify{background:var(--green);color:white;font-size:.8rem;
  padding:.6rem 1rem;border-radius:8px;white-space:nowrap;}
.notify-skip{display:block;text-align:center;font-size:.7rem;color:var(--muted);
  margin-top:.5rem;cursor:pointer;text-decoration:underline;}
.err{background:#fff5f5;border:1px solid #f5c0c0;border-radius:8px;
  padding:.9rem 1.1rem;color:#a05050;font-size:.82rem;margin-bottom:1rem;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* TABLET/DESKTOP enhancements */
@media(min-width:540px){
  .landscape-illus{height:220px;}
  .preview-img{height:120px;}
  .contact-links{gap:.8rem;}
}
@media(min-width:768px){
  .landscape-illus{height:260px;}
  main{padding:2rem 1.5rem;}
}
</style>
</head>

/* ── STATE ── */
var lang="zh", step=-1, ans={}, res=null, cynShown=false;
function t(){return TX[lang];}
function el(id){return document.getElementById(id);}
function appEl(){return el("app");}

/* ── LANGUAGE ── */
function DR_setLang(l){
  lang=l;
  el("btnZH").classList.toggle("active",l==="zh");
  el("btnEN").classList.toggle("active",l==="en");
  render();
}

/* ── HISTORY (localStorage) ── */
function loadHistory(){
  try{ return JSON.parse(localStorage.getItem(STORAGE_KEY)||"[]"); }
  catch(e){ return []; }
}
function saveToHistory(entry){
  try{
    var h=loadHistory();
    h.unshift(entry); // newest first
    if(h.length>20) h=h.slice(0,20); // keep 20 max
    localStorage.setItem(STORAGE_KEY,JSON.stringify(h));
  }catch(e){}
}
function clearHistory(){
  if(confirm(lang==="zh"?"確定要清除所有練習紀錄嗎？":"Clear all practice records?")) {
    try{localStorage.removeItem(STORAGE_KEY);}catch(e){}
    render();
  }
}

/* ── BROWSER HISTORY ── */
function pushState(s){
  try{history.pushState({step:s,ans:JSON.parse(JSON.stringify(ans)),lang:lang},"","#"+s);}catch(e){}
}
window.addEventListener("popstate",function(e){
  if(e.state){lang=e.state.lang||lang;ans=e.state.ans||{};step=e.state.step;render(false);}
});

/* ── DOTS ── */
function dots(cur){
  var s="<div class='step-row'>";
  for(var i=0;i<3;i++) s+="<div class='sdot"+(i<cur?" done":i===cur?" active":"")+"'></div>";
  return s+"</div>";
}

/* ── RENDER ── */
function render(push){
  if(push!==false) pushState(step);
  if(step===-1) renderIntro();
  else if(step>=0&&step<=2) renderQ(step);
  else if(step===3) renderSpin();
  else renderResult();
}

function renderIntro(){
  var tx=t(), history=loadHistory();
  var historyHTML="";
  if(history.length>0){
    historyHTML="<div class='card' style='margin-top:0;'>"+
      "<div class='card-label label-blue'>"+tx.historyTitle+"</div>"+
      "<div style='font-size:.7rem;color:var(--muted);margin-bottom:.8rem;'>"+tx.historyHint+"</div>";
    for(var i=0;i<Math.min(history.length,5);i++){
      var e=history[i];
      var cardSrc=CARDS[LS[e.landscape]?LS[e.landscape].card:"A"];
      historyHTML+=
        "<div class='history-entry' onclick='loadHistoryEntry("+i+")'>"+
          "<img class='history-img' src='"+cardSrc+"' alt=''>"+
          "<div class='history-date'>"+e.date+"</div>"+
          "<div class='history-sentence'>"+e.postcard+"</div>"+
          "<div class='history-landscape'>"+(LS[e.landscape]?LS[e.landscape][lang].name:"")+"</div>"+
        "</div>";
    }
    historyHTML+=
      "<div style='text-align:right;margin-top:.5rem;'>"+
        "<button class='btn-ghost' style='font-size:.72rem;padding:.4rem .8rem;' onclick='clearHistory()'>"+tx.clearHistory+"</button>"+
      "</div>"+
    "</div>";
  }

  appEl().innerHTML=
    "<div class='card'>"+
      "<div class='intro-hi'>"+tx.hi+"</div>"+
      "<div class='intro-body'>"+tx.intro+"</div>"+
    "</div>"+
    "<div class='consent-box'>"+
      "<input type='checkbox' id='cb' onchange='el(\"sb\").disabled=!this.checked'>"+
      "<label for='cb'>"+tx.consent+"<br><strong>"+tx.consentOk+"</strong></label>"+
    "</div>"+
    "<div class='start-wrap'>"+
      "<button class='btn-primary' id='sb' disabled onclick='step=0;render()' style='padding:.75rem 2.5rem;font-size:.95rem;'>"+tx.startBtn+"</button>"+
    "</div>"+
    historyHTML;
}

function loadHistoryEntry(idx){
  var history=loadHistory();
  var e=history[idx];
  if(!e) return;
  res={practice:e.practice,postcard:e.postcard,cynical:e.cynical,landscape:e.landscape};
  ans={0:e.q1,1:e.q2,2:e.q3};
  step=4; render();
}

function renderQ(idx){
  var tx=t(),q=tx.qs[idx],saved=ans[idx]||"";
  var html=dots(idx)+"<div class='card'>"+
    "<div class='q-num'>"+q.n+"</div>"+
    "<div class='q-text'>"+q.q+"</div>"+
    "<div class='q-hint'>"+q.h+"</div>"+
    "<textarea id='ta' placeholder='"+q.p+"' rows='3'>"+saved+"</textarea>"+
    "<div class='btn-row'>";
  if(idx>0) html+="<button class='btn-ghost' onclick='saveAns("+idx+");step--;render()'>"+tx.back+"</button>";
  html+="<button class='btn-ghost' onclick='saveAns("+idx+");adv("+idx+")'>"+tx.skip+"</button>"+
    "<button class='btn-primary' onclick='saveAns("+idx+");adv("+idx+")'>"+(idx<2?tx.next:tx.gen)+"</button>"+
    "</div></div>";
  appEl().innerHTML=html;
  var ta=el("ta"); if(ta){ta.focus();ta.addEventListener("input",function(){ans[idx]=ta.value.trim();});}
}

function saveAns(i){var ta=el("ta");if(ta) ans[i]=ta.value.trim();}
function adv(i){if(i<2){step++;render();}else{step=3;render();generate();}}

function renderSpin(){
  appEl().innerHTML="<div class='spinning'><div class='spinner'></div><p>"+t().loading+"</p></div>";
}

/* ── GENERATE ── */
function generate(){
  var a0=ans[0]||"未填",a1=ans[1]||"未填",a2=ans[2]||"未填";
  var isEn=lang==="en";
  var lsList=Object.keys(LS).map(function(k){return '"'+k+'": '+LS[k][lang].name+' ('+LS[k][lang].tag+')';}).join(", ");
  var prompt=isEn?
    'You are a warm poetic narrative therapy guide. Generate based on three answers:\n'+
    '1. "practice": Gentle daily practice (4-6 sentences, specific, doable, no lecturing, drawn from exact words, 21+ possible versions)\n'+
    '2. "postcard": Under 15 words. Poetic, warm, grown from this specific situation.\n'+
    '3. "cynical": Darkly funny one-liner in Taiwanese internet humour style — like "May you never step on a Lego barefoot" or "One more minute and you\'re allowed to cry". Funny, absurd, oddly comforting. Fresh and specific.\n'+
    '4. "landscape": ONE key from: '+lsList+'\n'+
    'Q1: '+a0+' / Q2: '+a1+' / Q3: '+a2+'\n'+
    'Return ONLY valid JSON: {"practice":"...","postcard":"...","cynical":"...","landscape":"KEY"}'
    :
    '你是溫柔有詩意的敘事治療引導者。根據三個答案生成：\n'+
    '1. "practice"：日常小練習（4-6句，具體可操作，不說教，從這個人的具體措辭長出來，想像至少21種真正不同的版本）\n'+
    '2. "postcard"：明信片句子（15字以內，有詩意，從這個人的狀況長出來，不是套話）\n'+
    '3. "cynical"：台灣網路風格厭世金句，搞笑帶溫暖，像「祝你起床不會踩到樂高」或「再撐一下就可以哭了」——有點苦、有點荒謬、莫名讓人覺得被懂，根據這個人的狀況長出來。\n'+
    '4. "landscape"：從以下選一個最符合情緒狀態的key：'+lsList+'\n'+
    '問題1：'+a0+' / 問題2：'+a1+' / 問題3：'+a2+'\n'+
    '只回傳合法JSON：{"practice":"...","postcard":"...","cynical":"...","landscape":"KEY"}';

  fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,
      messages:[{role:"user",content:prompt}]})
  }).then(function(r){return r.json();}).then(function(data){
    var raw=data.content.map(function(b){return b.text||"";}).join("");
    res=JSON.parse(raw.replace(/```json|```/g,"").trim());
    if(!LS[res.landscape]) res.landscape="cloud";
    // Save to localStorage
    var now=new Date();
    var dateStr=now.getFullYear()+"/"+(now.getMonth()+1)+"/"+now.getDate()+" "+now.getHours()+":"+String(now.getMinutes()).padStart(2,"0");
    saveToHistory({date:dateStr,q1:a0,q2:a1,q3:a2,landscape:res.landscape,practice:res.practice,postcard:res.postcard,cynical:res.cynical,lang:lang});
    // Save to Google Sheet
    toSheet({type:"response",lang:lang,q1:a0,q2:a1,q3:a2,landscape:res.landscape,practice:res.practice,postcard:res.postcard,cynical:res.cynical});
    step=4; render();
  }).catch(function(e){
    appEl().innerHTML="<div class='err'>"+(lang==="zh"?"連線問題：":"Error: ")+e.message+"</div>"+
    "<div class='btn-row'><button class='btn-primary' onclick='step=3;render();generate();'>"+(lang==="zh"?"再試一次":"Retry")+"</button></div>";
  });
}

function toSheet(data){
  if(!SHEET_URL||SHEET_URL==="YOUR_APPS_SCRIPT_URL_HERE") return;
  fetch(SHEET_URL,{method:"POST",mode:"no-cors",body:JSON.stringify(data),
    headers:{"Content-Type":"application/json"}}).catch(function(){});
}

/* ── SAVE POSTCARD ── */
function savePostcard(){
  var canvas=el("pcCanvas");
  var ls=LS[res.landscape],lsd=ls[lang];
  var inc=el("incCyn")&&el("incCyn").checked;
  var ctx=canvas.getContext("2d");
  canvas.width=640; canvas.height=inc?500:435;
  var img=new Image();
  img.onload=function(){
    ctx.fillStyle="#f7f2eb"; ctx.fillRect(0,0,640,canvas.height);
    ctx.drawImage(img,0,0,640,190);
    var g=ctx.createLinearGradient(0,0,640,0);
    g.addColorStop(0,"#c8a882");g.addColorStop(.5,"#8b5e3c");g.addColorStop(1,"#4a6741");
    ctx.fillStyle=g; ctx.fillRect(0,0,640,4);
    ctx.fillStyle="#4a6880"; ctx.fillRect(0,190,640,52);
    ctx.fillStyle="white"; ctx.font="bold 15px serif";
    ctx.fillText(lsd.name,16,212);
    ctx.fillStyle="rgba(255,255,255,.7)"; ctx.font="12px sans-serif";
    ctx.fillText(lsd.loc,16,230);
    ctx.fillStyle="#1a1410"; ctx.font="13px serif";
    var py=265, line="", chars=res.practice;
    for(var i=0;i<chars.length;i++){
      var test=line+chars[i];
      if(ctx.measureText(test).width>600&&line!==""){
        ctx.fillText(line,20,py); line=chars[i]; py+=21;
      } else { line=test; }
    }
    if(line){ctx.fillText(line,20,py); py+=21;}
    ctx.fillStyle="#8b5e3c"; ctx.font="bold 19px serif";
    ctx.textAlign="center"; ctx.fillText(res.postcard,320,py+28);
    if(inc){
      ctx.fillStyle="#9a8878"; ctx.font="italic 13px serif";
      ctx.fillText(res.cynical,320,py+56);
    }
    ctx.fillStyle="#c0b4a8"; ctx.font="11px sans-serif";
    ctx.fillText("Dear.Rehearsal × Fuhealing",320,canvas.height-14);
    ctx.textAlign="left";
    var a=document.createElement("a");
    a.download="dear-rehearsal-postcard.png";
    a.href=canvas.toDataURL("image/png"); a.click();
  };
  img.src=CARDS[ls.card];
}

function shareIG(){
  savePostcard();
  setTimeout(function(){window.open("https://www.instagram.com/","_blank");},900);
}

function submitFeedback(){
  var fb=el("fbText").value.trim();
  var em=el("fbEmail").value.trim();
  if(!fb) return;
  toSheet({type:"feedback",lang:lang,feedback:fb,email:em});
  el("fbText").value=""; el("fbEmail").value="";
  el("fbDone").style.display="block";
}

function submitNotify(){
  var v=el("notifyEmail").value.trim();
  if(!v||v.indexOf("@")<0) return;
  toSheet({type:"notify",lang:lang,email:v,q1:ans[0]||"",q2:ans[1]||"",q3:ans[2]||"",
    landscape:res?res.landscape:"",practice:res?res.practice:"",
    postcard:res?res.postcard:"",cynical:res?res.cynical:""});
  el("notifyRow").style.display="none";
  el("notifyDone").style.display="block";
  document.querySelector(".notify-skip").style.display="none";
}
